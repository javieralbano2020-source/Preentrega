{% extends "base.html" %}
{% block contenido %}
<div class="card shadow-sm">
    <div class="card-header bg-evento text-white d-flex justify-content-between align-items-center">
        <h4 class="mb-0">🗓️ Eventos registrados</h4>
        <a href="{% url 'form_evento' %}" class="btn btn-light btn-sm">+ Nuevo evento</a>
    </div>
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Fecha</th>
                    <th>Ubicación</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for evento in eventos %}
                <tr>
                    <td>{{ evento.nombre }}</td>
                    <td>{{ evento.fecha }}</td>
                    <td>{{ evento.ubicacion }}</td>
                    <td>
                        <a href="{% url 'editar_evento' evento.id %}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{% url 'eliminar_evento' evento.id %}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-muted">No hay eventos registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
