{% extends "base.html" %}
{% block contenido %}
<div class="card shadow-sm">
    <div class="card-header bg-personas text-white d-flex justify-content-between align-items-center">
        <h4 class="mb-0">👤 Personas registradas</h4>
        <a href="{% url 'form_persona' %}" class="btn btn-light btn-sm">+ Nueva persona</a>
    </div>
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Email</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for persona in personas %}
                <tr>
                    <td>{{ persona.nombre }}</td>
                    <td>{{ persona.apellido }}</td>
                    <td>{{ persona.email }}</td>
                    <td>
                        <a href="{% url 'editar_persona' persona.id %}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{% url 'eliminar_persona' persona.id %}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-muted">No hay personas registradas.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
