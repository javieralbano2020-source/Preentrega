{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-register text-white">
                <h4 class="mb-0">📝 Crear Cuenta</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                        <div class="form-text text-secondary">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100">Registrarse</button>
                </form>
                <hr>
                <p class="text-center mb-0">¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
