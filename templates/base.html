<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .navbar-custom { background-color: #1e2a3a; }
        .bg-personas { background-color: #1a4a5c; }
        .bg-ubicacion { background-color: #1a4a3a; }
        .bg-evento { background-color: #3a2a5c; }
        .bg-buscar { background-color: #2a3a5c; }
        .bg-login { background-color: #1a4a5c; }
        .bg-register { background-color: #1a4a3a; }
        .bg-about { background-color: #2a2a3a; }
        .bg-eliminar { background-color: #5c1a1a; }
        .card { background-color: #1e1e2e; border: none; }
        .card-body { color: #e0e0e0; }
        .table { color: #e0e0e0; }
        .table-hover tbody tr:hover { background-color: #2a2a3a; color: #e0e0e0; }
        input.form-control, select.form-select { background-color: #2a2a3a; color: #e0e0e0; border-color: #444; }
        input.form-control:focus, select.form-select:focus { background-color: #2a2a3a; color: #e0e0e0; border-color: #6c757d; box-shadow: none; }
        input[type="text"], input[type="password"], input[type="email"] {
        width: 100%;
        background-color: #2a2a3a;
        color: #e0e0e0;
        border: 1px solid #444;
        border-radius: 5px;
        padding: 8px 12px;
        margin-top: 4px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
        outline: none;
        border-color: #6c757d;
        background-color: #2a2a3a;
        color: #e0e0e0;
    }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="{% url 'home' %}">📅 Gestión de Eventos</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'form_persona' %}">Registrar Persona</a>
                <a class="nav-link text-white" href="{% url 'form_ubicacion' %}">Registrar Ubicación</a>
                <a class="nav-link text-white" href="{% url 'form_evento' %}">Crear Evento</a>
                <a class="nav-link text-white" href="{% url 'buscar_evento' %}">Buscar Evento</a>
                <a class="nav-link text-white" href="{% url 'about' %}">Acerca de</a>
                {% if user.is_authenticated %}
                    <span class="nav-link text-white">👤 {{ user.username }}</span>
                    <a class="nav-link text-white" href="{% url 'logout' %}">Cerrar Sesión</a>
                {% else %}
                    <a class="nav-link text-white" href="{% url 'login' %}">Iniciar Sesión</a>
                    <a class="nav-link text-white" href="{% url 'register' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block contenido %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
