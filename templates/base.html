<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">📅 Gestión de Eventos</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'form_persona' %}">Registrar Persona</a>
                <a class="nav-link text-white" href="{% url 'form_ubicacion' %}">Registrar Ubicación</a>
                <a class="nav-link text-white" href="{% url 'form_evento' %}">Crear Evento</a>
                <a class="nav-link text-white" href="{% url 'buscar_evento' %}">Buscar Evento</a>
                <a class="nav-link text-white" href="{% url 'about' %}">Acerca de</a>
                {% if user.is_authenticated %}
                    <span class="nav-link text-white">👤 {{ user.username }}</span>
                    <a class="nav-link text-white" href="{% url 'logout' %}">Cerrar Sesión</a>
                {% else %}
                    <a class="nav-link text-white" href="{% url 'login' %}">Iniciar Sesión</a>
                    <a class="nav-link text-white" href="{% url 'register' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block contenido %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
