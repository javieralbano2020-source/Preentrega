{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-login text-white">
                <h4 class="mb-0">🔐 Iniciar Sesión</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                </form>
                <hr>
                <p class="text-center mb-0">¿No tenés cuenta? <a href="{% url 'register' %}">Registrate</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
