{% extends 'base.html' %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-evento text-white">
                <h4 class="mb-0">🗓️ Crear Nuevo Evento</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-warning w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
