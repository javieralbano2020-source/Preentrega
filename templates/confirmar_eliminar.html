{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-eliminar text-white">
                <h4 class="mb-0">⚠️ Confirmar eliminación</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">¿Estás seguro que querés eliminar <strong>{{ objeto }}</strong>?</p>
                <form method="POST">
                    {% csrf_token %}
                    <a href="javascript:history.back()" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
